spring:
  datasource:
    url: jdbc:mysql://localhost:3306/website?useSSL=false&serverTimezone=UTC
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      # 0 = 啟動時不強制驗證連線，允許 DatabaseInitializer 先建立 DB
      initialization-fail-timeout: 0

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
