spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/JerryX?currentSchema=website
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
    hikari:
      # 0 = 啟動時不強制驗證連線，允許 DatabaseInitializer 先建立 DB
      initialization-fail-timeout: 0

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
